<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Proactive Ecosystem Preview</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #root { display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; }
        .mobile-shell {
            width: 375px; height: 812px;
            background: #050505; border: 12px solid #1a1a1a;
            border-radius: 50px; position: relative;
            overflow: hidden; box-shadow: 0 0 100px rgba(0, 240, 255, 0.15);
            display: flex; flex-direction: column;
        }
        .screen-content { flex: 1; overflow-y: auto; position: relative; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
        @keyframes radar-scan { from { left: -100%; } to { left: 100%; } }
        @keyframes emergency-pulse { 0% { background-color: #450000; } 50% { background-color: #900000; } 100% { background-color: #450000; } }
        .status-bar { height: 44px; width: 100%; background: transparent; display: flex; justify-content: space-between; align-items: center; padding: 0 30px; box-sizing: border-box; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- MOCK SERVICES ---
        const PredictiveEngine = {
            getRisk: () => ({ level: 'MODERATE', score: 0.64, recommendation: 'Stay on Main St' })
        };

        // --- SCREENS ---

        const Login = ({ onLogin }) => (
            <div style={{ height: '100%', display: 'flex', flexDirection: 'column', justifyContent: 'center', padding: '40px', boxSizing: 'border-box' }}>
                <div style={{ textAlign: 'center', marginBottom: '50px' }}>
                    <div style={{ width: '70px', height: '70px', borderRadius: '20px', backgroundColor: '#00F0FF', color: '#000', fontSize: '2.5rem', fontWeight: '900', margin: '0 auto 20px', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 0 30px rgba(0, 240, 255, 0.5)' }}>S</div>
                    <h1 style={{ fontSize: '1.8rem', letterSpacing: '8px', fontWeight: '900', margin: 0 }}>SENTINEL</h1>
                    <p style={{ color: '#444', fontSize: '0.7rem', letterSpacing: '2px', marginTop: '10px' }}>PROACTIVE LIFE PROTECTION</p>
                </div>
                <div style={{ marginBottom: '25px' }}>
                    <label style={{ color: '#00F0FF', fontSize: '0.6rem', fontWeight: 'bold', display: 'block', marginBottom: '10px' }}>OPERATOR CREDENTIALS</label>
                    <input style={{ width: '100%', padding: '18px', backgroundColor: '#111', border: '1px solid #222', borderRadius: '15px', color: '#fff', boxSizing: 'border-box' }} value="SENTINEL-X-882" readOnly />
                </div>
                <button 
                    style={{ width: '100%', padding: '20px', backgroundColor: '#00F0FF', color: '#000', border: 'none', borderRadius: '15px', fontWeight: 'bold', cursor: 'pointer', fontSize: '1rem', letterSpacing: '1px' }} 
                    onClick={onLogin}
                >
                    INITIALIZE SYSTEM
                </button>
            </div>
        );

        const Dashboard = ({ onTriggerCrisis }) => {
            const risk = PredictiveEngine.getRisk();
            return (
                <div style={{ padding: '20px', height: '100%', boxSizing: 'border-box' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '40px' }}>
                        <div style={{ letterSpacing: '2px', fontSize: '0.9rem', fontWeight: '900', color: '#00F0FF' }}>SYSTEM: ACTIVE</div>
                        <div style={{ fontSize: '0.6rem', color: '#00F0FF', animation: 'pulse 2s infinite' }}>● AI SCANNING</div>
                    </div>

                    <div style={{ display: 'flex', justifyContent: 'center', margin: '40px 0', position: 'relative' }}>
                        <div style={{ width: '220px', height: '220px', borderRadius: '50%', border: '1px solid #00F0FF33', display: 'flex', justifyContent: 'center', alignItems: 'center' }}>
                            <div style={{ width: '180px', height: '180px', borderRadius: '50%', border: '1px solid #00F0FF', display: 'flex', justifyContent: 'center', alignItems: 'center', animation: 'spin 8s linear infinite' }}>
                                <div style={{ position: 'absolute', top: '50%', left: '50%', width: '50%', height: '2px', background: 'linear-gradient(to right, transparent, #00F0FF)', transformOrigin: 'left center' }}></div>
                            </div>
                            <div style={{ position: 'absolute', textAlign: 'center' }}>
                                <div style={{ fontSize: '0.5rem', color: '#666', marginBottom: '5px' }}>ENV. RISK</div>
                                <div style={{ fontSize: '1.2rem', fontWeight: 'bold', color: '#00F0FF' }}>{(risk.score * 100).toFixed(0)}%</div>
                            </div>
                        </div>
                    </div>

                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '15px', marginBottom: '30px' }}>
                        <div style={{ backgroundColor: '#111', padding: '15px', borderRadius: '15px', border: '1px solid #222' }}>
                            <span style={{ fontSize: '0.55rem', color: '#444', fontWeight: 'bold' }}>MESH NODES</span><br/>
                            <span style={{ fontSize: '1rem', fontWeight: 'bold' }}>14 NEARBY</span>
                        </div>
                        <div style={{ backgroundColor: '#111', padding: '15px', borderRadius: '15px', border: '1px solid #222' }}>
                            <span style={{ fontSize: '0.55rem', color: '#444', fontWeight: 'bold' }}>BIOMETRICS</span><br/>
                            <span style={{ fontSize: '1rem', fontWeight: 'bold' }}>72 BPM</span>
                        </div>
                    </div>

                    <div style={{ backgroundColor: 'rgba(0, 240, 255, 0.05)', padding: '20px', borderRadius: '20px', border: '1px solid #00F0FF33', marginBottom: '30px' }}>
                        <span style={{ fontSize: '0.6rem', color: '#00F0FF', fontWeight: 'bold' }}>OMEN LIDAR SCANNER</span>
                        <div style={{ display: 'flex', alignItems: 'center', marginTop: '10px' }}>
                            <div style={{ width: '100%', height: '40px', backgroundColor: '#000', borderRadius: '5px', position: 'relative', overflow: 'hidden', border: '1px solid #222' }}>
                                <div style={{ position: 'absolute', height: '100%', width: '40%', backgroundColor: 'rgba(0, 240, 255, 0.2)', animation: 'radar-scan 2s infinite linear' }}></div>
                            </div>
                        </div>
                        <p style={{ fontSize: '0.7rem', color: '#888', marginTop: '8px' }}>Monitoring 360° proximity. No threats detected in blind spots.</p>
                    </div>

                    <div style={{ backgroundColor: 'rgba(0, 240, 255, 0.05)', padding: '20px', borderRadius: '20px', border: '1px solid #00F0FF33', marginBottom: '30px' }}>
                        <span style={{ fontSize: '0.6rem', color: '#00F0FF', fontWeight: 'bold' }}>TEMPORAL PREDICTION</span>
                        <p style={{ fontSize: '0.8rem', margin: '10px 0 0 0', color: '#ccc' }}>Elevated risk detected on Market St in 15 mins. Recommendation: {risk.recommendation}.</p>
                    </div>

                    <button 
                        style={{ width: '100%', padding: '20px', borderRadius: '15px', border: '1px solid #ff4b4b', backgroundColor: 'transparent', color: '#ff4b4b', fontWeight: 'bold', cursor: 'pointer' }}
                        onClick={onTriggerCrisis}
                    >
                        MANUAL SOS
                    </button>
                </div>
            );
        };

        const CrisisScreen = ({ onResolve }) => {
            const [timer, setTimer] = useState(10);
            useEffect(() => {
                const i = setInterval(() => setTimer(t => t > 0 ? t - 1 : 0), 1000);
                return () => clearInterval(i);
            }, []);

            return (
                <div style={{ height: '100%', animation: 'emergency-pulse 2s infinite', padding: '30px', boxSizing: 'border-box', textAlign: 'center' }}>
                    <div style={{ fontSize: '4rem', marginBottom: '20px' }}>⚠️</div>
                    <h1 style={{ fontSize: '1.5rem', fontWeight: '900', letterSpacing: '2px', margin: '0 0 10px 0' }}>CRISIS DETECTED</h1>
                    <p style={{ color: '#ff8a8a', fontSize: '0.8rem', marginBottom: '40px' }}>Acoustic AI: "Gunshot/Impact Sound"</p>
                    
                    <div style={{ width: '140px', height: '140px', borderRadius: '50%', border: '4px solid #fff', margin: '0 auto 40px', display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center' }}>
                        <span style={{ fontSize: '3rem', fontWeight: '900' }}>{timer}s</span>
                        <span style={{ fontSize: '0.5rem', opacity: 0.6 }}>TO DISPATCH</span>
                    </div>

                    <div style={{ backgroundColor: 'rgba(0,0,0,0.5)', borderRadius: '15px', padding: '15px', textAlign: 'left', marginBottom: '40px', height: '120px' }}>
                        <div style={{ fontSize: '0.6rem', color: '#ff4b4b', fontWeight: 'bold', marginBottom: '10px' }}>SECURE EVIDENCE STREAM</div>
                        <div style={{ fontSize: '0.6rem', color: '#aaa', fontFamily: 'JetBrains Mono, monospace' }}>
                            [00:01] Buffer established...<br/>
                            [00:02] GPS Locked: 30.044, 31.235<br/>
                            [00:03] Uploading audio burst...<br/>
                            [00:04] Notifying 14 Mesh Nodes...
                        </div>
                    </div>

                    <button 
                        style={{ width: '100%', padding: '20px', backgroundColor: '#fff', color: '#900000', border: 'none', borderRadius: '15px', fontWeight: '900' }}
                        onClick={onResolve}
                    >
                        I AM SAFE (PIN)
                    </button>
                </div>
            );
        };

        const MapScreen = () => (
            <div style={{ padding: '20px', height: '100%', boxSizing: 'border-box' }}>
                <div style={{ fontSize: '0.9rem', fontWeight: '900', color: '#666', letterSpacing: '2px', marginBottom: '20px' }}>SAFETY HEATMAP</div>
                <div style={{ height: '60%', backgroundColor: '#111', borderRadius: '25px', border: '1px solid #222', position: 'relative', overflow: 'hidden', backgroundImage: 'radial-gradient(#222 1px, transparent 1px)', backgroundSize: '20px 20px' }}>
                    <div style={{ position: 'absolute', top: '30%', left: '40%', width: '100px', height: '100px', backgroundColor: 'rgba(255, 75, 75, 0.2)', borderRadius: '50%', filter: 'blur(25px)' }}></div>
                    <div style={{ position: 'absolute', top: '50%', left: '50%', width: '12px', height: '12px', backgroundColor: '#fff', borderRadius: '50%', boxShadow: '0 0 15px #fff' }}></div>
                    <div style={{ position: 'absolute', top: '45%', left: '65%', width: '8px', height: '8px', backgroundColor: '#00F0FF', borderRadius: '50%', boxShadow: '0 0 10px #00F0FF' }}></div>
                </div>
                <div style={{ marginTop: '30px' }}>
                    <h3 style={{ color: '#00F0FF', margin: '0 0 10px 0', fontSize: '1rem' }}>Dynamic Escort Mode</h3>
                    <p style={{ fontSize: '0.75rem', color: '#888', lineHeight: '1.5' }}>Routing is optimized for maximum lighting and Mesh Node proximity. Current route is 94% secure.</p>
                </div>
            </div>
        );

        const App = () => {
            const [screen, setScreen] = useState('LOGIN');
            
            return (
                <div className="mobile-shell">
                    <div className="status-bar">
                        <span>9:41</span>
                        <div style={{ display: 'flex', gap: '5px' }}>📶 🔋</div>
                    </div>
                    <div className="screen-content">
                        {screen === 'LOGIN' && <Login onLogin={() => setScreen('DASHBOARD')} />}
                        {screen === 'DASHBOARD' && <Dashboard onTriggerCrisis={() => setScreen('CRISIS')} />}
                        {screen === 'MAP' && <MapScreen />}
                        {screen === 'CRISIS' && <CrisisScreen onResolve={() => setScreen('DASHBOARD')} />}
                    </div>
                    
                    {screen !== 'LOGIN' && screen !== 'CRISIS' && (
                        <div style={{ height: '80px', display: 'flex', borderTop: '1px solid #1a1a1a', backgroundColor: '#050505' }}>
                            <button onClick={() => setScreen('DASHBOARD')} style={{ flex: 1, background: 'none', border: 'none', color: screen === 'DASHBOARD' ? '#00F0FF' : '#444', fontSize: '0.6rem', fontWeight: '900', letterSpacing: '1px' }}>DASHBOARD</button>
                            <button onClick={() => setScreen('MAP')} style={{ flex: 1, background: 'none', border: 'none', color: screen === 'MAP' ? '#00F0FF' : '#444', fontSize: '0.6rem', fontWeight: '900', letterSpacing: '1px' }}>SAFETY MAP</button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
