<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Pro: Light Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background-color: #f0f2f5; color: #1a1c1e; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #root { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        .mobile-shell {
            width: 375px; height: 812px;
            background: #ffffff; border: 12px solid #1a1c1e;
            border-radius: 50px; position: relative;
            overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            display: flex; flex-direction: column;
        }
        .status-bar { height: 44px; padding: 0 30px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: 800; }
        .screen-content { flex: 1; overflow-y: auto; padding: 20px; }
        
        /* Light Theme Styles */
        .card { background: #f8fafc; border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .sos-btn {
            width: 120px; height: 120px; border-radius: 50%;
            background: #ef4444; border: 8px solid #fee2e2;
            color: white; font-weight: 800; font-size: 1.5rem;
            margin: 20px auto; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3);
            cursor: pointer; position: relative;
        }
        .sos-btn::after {
            content: ''; position: absolute; width: 100%; height: 100%;
            border-radius: 50%; border: 2px solid #ef4444;
            animation: ripple 2s infinite;
        }
        @keyframes ripple { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .action-chip { background: #fff; padding: 12px; border-radius: 15px; border: 1px solid #e2e8f0; font-size: 0.7rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        
        /* Emergency Mode */
        .emergency-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: #ef4444; z-index: 100; display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: white; padding: 40px; text-align: center;
            animation: flash red 1s infinite;
        }
        .stop-btn {
            width: 100%; padding: 20px; background: white; color: #ef4444;
            border-radius: 20px; font-weight: 800; border: none; margin-top: 40px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [isEmergency, setIsEmergency] = useState(false);
            const [countdown, setCountdown] = useState(60);
            const [showPin, setShowPin] = useState(false);
            const [pin, setPin] = useState("");

            useEffect(() => {
                let timer;
                if (isEmergency && countdown > 0) {
                    timer = setInterval(() => setCountdown(c => c - 1), 1000);
                }
                return () => clearInterval(timer);
            }, [isEmergency, countdown]);

            const handleStop = () => setShowPin(true);
            const handlePinSubmit = () => {
                if (pin === "1234") {
                    setIsEmergency(false);
                    setShowPin(false);
                    setCountdown(60);
                    setPin("");
                } else {
                    alert("Wrong Passcode");
                }
            };

            return (
                <div className="mobile-shell">
                    <div className="status-bar">
                        <span>9:41</span>
                        <div style={{display: 'flex', gap: '5px'}}>📶 🔋</div>
                    </div>

                    {isEmergency ? (
                        <div className="emergency-overlay">
                            <div style={{fontSize: '4rem', marginBottom: '20px'}}>🚨</div>
                            <h1 style={{fontSize: '2rem', fontWeight: '900'}}>EMERGENCY ACTIVE</h1>
                            <p style={{opacity: 0.9}}>Pattern Detected: Severe Medical Distress</p>
                            
                            <div style={{width: '150px', height: '150px', borderRadius: '50%', border: '4px solid white', margin: '40px 0', display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center'}}>
                                <span style={{fontSize: '3rem', fontWeight: '900'}}>{countdown}s</span>
                                <span style={{fontSize: '0.6rem'}}>TILL DISPATCH</span>
                            </div>

                            {!showPin ? (
                                <button className="stop-btn" onClick={handleStop}>STOP ALERT</button>
                            ) : (
                                <div style={{width: '100%'}}>
                                    <input 
                                        type="password" 
                                        placeholder="ENTER PASSCODE"
                                        style={{width: '100%', padding: '20px', borderRadius: '20px', border: 'none', marginBottom: '10px', textAlign: 'center', fontWeight: 'bold'}}
                                        value={pin}
                                        onChange={(e) => setPin(e.target.value)}
                                    />
                                    <button className="stop-btn" style={{marginTop: '0'}} onClick={handlePinSubmit}>CONFIRM</button>
                                </div>
                            )}
                        </div>
                    ) : (
                        <div className="screen-content">
                            <div style={{textAlign: 'center', marginBottom: '20px'}}>
                                <h2 style={{margin: 0, color: '#ef4444'}}>SENTINEL PRO</h2>
                                <p style={{fontSize: '0.7rem', color: '#64748b'}}>Always Ready • Offline Ready</p>
                            </div>

                            <div style={{background: '#f1f5f9', borderRadius: '15px', padding: '10px', display: 'flex', justifyContent: 'center', gap: '10px', marginBottom: '20px'}}>
                                <div style={{fontSize: '0.7rem', color: '#059669', fontWeight: '800'}}>● ONLINE - READY</div>
                            </div>

                            <div className="grid">
                                <div className="action-chip">🔆 Light Mode</div>
                                <div className="action-chip" style={{background: '#3b82f6', color: 'white', border: 'none'}}>📍 Get Location</div>
                            </div>

                            <div className="sos-btn" onClick={() => setIsEmergency(true)}>SOS</div>

                            <div className="card">
                                <h4 style={{margin: '0 0 15px 0', color: '#ef4444', fontSize: '0.9rem'}}>First Aid AI Assistant</h4>
                                <div style={{background: '#fff', padding: '15px', borderRadius: '12px', border: '1px solid #e2e8f0', marginBottom: '10px'}}>
                                    <span style={{fontSize: '0.8rem', fontWeight: 'bold'}}>CPR Instructions</span>
                                    <p style={{fontSize: '0.7rem', color: '#64748b', margin: '5px 0 0 0'}}>Push hard and fast at 100 BPM. Flashlight will pulse the rhythm.</p>
                                </div>
                                <div style={{background: '#fff', padding: '15px', borderRadius: '12px', border: '1px solid #e2e8f0'}}>
                                    <span style={{fontSize: '0.8rem', fontWeight: 'bold'}}>Choking (Heimlich)</span>
                                    <p style={{fontSize: '0.7rem', color: '#64748b', margin: '5px 0 0 0'}}>Perform 5 abdominal thrusts now.</p>
                                </div>
                            </div>

                            <div className="card" style={{marginBottom: '0'}}>
                                <h4 style={{margin: '0 0 15px 0', color: '#6366f1', fontSize: '0.9rem'}}>Self-Learning AI Brain</h4>
                                <div style={{background: '#fff', padding: '15px', borderRadius: '12px', border: '1px solid #e2e8f0', marginBottom: '10px'}}>
                                    <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px'}}>
                                        <span style={{fontSize: '0.7rem', fontWeight: 'bold'}}>Neural Baseline Progress</span>
                                        <span style={{fontSize: '0.6rem', color: '#6366f1'}}>82% Learned</span>
                                    </div>
                                    <div style={{width: '100%', height: '6px', background: '#f1f5f9', borderRadius: '3px', overflow: 'hidden'}}>
                                        <div style={{width: '82%', height: '100%', background: '#6366f1'}}></div>
                                    </div>
                                    <p style={{fontSize: '0.6rem', color: '#64748b', marginTop: '8px'}}>Sentinel is learning your "Normal" walking pace and heart rate to eliminate false alarms.</p>
                                </div>
                            </div>

                            <div className="card" style={{marginBottom: '0', marginTop: '15px'}}>
                                <h4 style={{margin: '0 0 15px 0', color: '#3b82f6', fontSize: '0.9rem'}}>AI Monitoring Status</h4>
                                <div style={{display: 'flex', gap: '10px'}}>
                                    <div style={{flex: 1, textAlign: 'center', background: '#fff', padding: '10px', borderRadius: '12px', border: '1px solid #e2e8f0'}}>
                                        <span style={{fontSize: '0.5rem', display: 'block'}}>MOTION</span>
                                        <span style={{fontSize: '0.7rem', fontWeight: 'bold'}}>STABLE</span>
                                    </div>
                                    <div style={{flex: 1, textAlign: 'center', background: '#fff', padding: '10px', borderRadius: '12px', border: '1px solid #e2e8f0'}}>
                                        <span style={{fontSize: '0.5rem', display: 'block'}}>BIOMETRICS</span>
                                        <span style={{fontSize: '0.7rem', fontWeight: 'bold'}}>NORMAL</span>
                                    </div>
                                    <div style={{flex: 1, textAlign: 'center', background: '#fff', padding: '10px', borderRadius: '12px', border: '1px solid #e2e8f0'}}>
                                        <span style={{fontSize: '0.5rem', display: 'block'}}>KID SAFE</span>
                                        <span style={{fontSize: '0.7rem', fontWeight: 'bold', color: '#059669'}}>ACTIVE</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {!isEmergency && (
                        <div style={{height: '70px', display: 'flex', borderTop: '1px solid #e2e8f0', background: '#fff'}}>
                            <div style={{flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '0.6rem', fontWeight: '800', color: '#ef4444'}}>HOME</div>
                            <div style={{flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '0.6rem', fontWeight: '800', color: '#64748b'}}>CONTACTS</div>
                            <div style={{flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '0.6rem', fontWeight: '800', color: '#64748b'}}>SETTINGS</div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
